# ── Stock watchlist pipeline — GitHub Actions ──────────────────────────────────────────────
# Two-cadence schedule:
#   Monday    06:00 UTC → owned portfolio (39 tickers)
#   Thursday  06:00 UTC → watchlist candidates (10 tickers, auto-skips owned)
#
# Manual trigger: Actions → Run workflow → choose group
#
# Required secrets (Settings → Secrets → Actions → New repository secret):
#   GMAIL_USER           — sender Gmail address
#   GMAIL_APP_PASSWORD   — Gmail App Password (not your login password)
#   NOTIFY_EMAIL         — recipient address (can be same as GMAIL_USER)
#
# Optional secrets:
#   ANTHROPIC_API_KEY    — Claude Haiku for AI thesis summaries (~$0.45/month at 100 tickers 2x/week)
#   NEWS_API_KEY         — newsapi.org free tier (100 calls/day)
#   ALPHA_VANTAGE_KEY    — alphavantage.co free tier (25 calls/day)

name: Weekly watchlist digest

on:
  schedule:
    - cron: "0 6 * * 1"    # Monday 06:00 UTC   → owned portfolio
    - cron: "0 6 * * 4"    # Thursday 06:00 UTC → watchlist candidates
  workflow_dispatch:        # Allow manual runs from Actions tab
    inputs:
      group:
        description: "Which group to run"
        required: true
        type: choice
        options:
          - owned
          - watchlist

permissions:
  contents: write             # Needed to cache signal file back to repo
  pages: write                # Needed to deploy to GitHub Pages
  id-token: write             # Needed for Pages OIDC auth

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Run pipeline, generate report + email ───────────────────────────────────────────
  analyse:
    name: Analyse watchlist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore signal cache
        uses: actions/cache@v4
        with:
          path: cache/signals_cache.json
          key: signals-cache-${{ github.run_id }}
          restore-keys: signals-cache-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine group
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "GROUP=${{ github.event.inputs.group }}" >> $GITHUB_ENV
          else
            DAY=$(date +%u)   # 1=Mon, 4=Thu
            if [ "$DAY" == "1" ]; then
              echo "GROUP=owned" >> $GITHUB_ENV
            else
              echo "GROUP=watchlist" >> $GITHUB_ENV
            fi
          fi
          echo "Running group: $GROUP"

      - name: Run watchlist pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
          ALPHA_VANTAGE_KEY:   ${{ secrets.ALPHA_VANTAGE_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
          CI_PAGES_URL:        https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python src/main.py --group $GROUP

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Save signal cache back to repo
        uses: actions/cache/save@v4
        if: always()
        with:
          path: cache/signals_cache.json
          key: signals-cache-${{ github.run_id }}

  # ── Job 2: Deploy public/ to GitHub Pages ──────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: analyse
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
