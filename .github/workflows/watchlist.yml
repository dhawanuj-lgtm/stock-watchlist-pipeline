# ── Stock watchlist pipeline — GitHub Actions ──────────────────────────────────────────────
# Two-cadence schedule (San Ramon, CA — Pacific Time):
#   Monday    6:35 AM PDT → owned portfolio (39 tickers)     [13:35 UTC summer / 14:35 UTC winter]
#   Thursday  6:35 AM PDT → watchlist candidates (10 tickers, auto-skips owned)
#
# Manual trigger: Actions → Run workflow → choose group
#
# Required secrets (Settings → Secrets → Actions → New repository secret):
#   GMAIL_USER           — sender Gmail address
#   GMAIL_APP_PASSWORD   — Gmail App Password (not your login password)
#   NOTIFY_EMAIL         — recipient address (can be same as GMAIL_USER)
#
# Optional secrets — add to unlock additional features:
#   FREE:
#   ANTHROPIC_API_KEY    — Claude Haiku for AI thesis summaries (~$0.45/month at 100 tickers 2x/week)
#   NEWS_API_KEY         — newsapi.org free tier (100 calls/day)
#   ALPHA_VANTAGE_KEY    — alphavantage.co free tier (25 calls/day)
#   FRED_API_KEY         — fred.stlouisfed.org (always free; anonymous access also works)
#   FINNHUB_API_KEY      — finnhub.io free tier (60 calls/min, no daily cap)
#   TELEGRAM_BOT_TOKEN   — Telegram Bot API token (BotFather → /newbot)
#   TELEGRAM_CHAT_ID     — Your Telegram chat/channel ID for signal flip/entry/position alerts
#   PAID (optional upgrade):
#   QUIVER_QUANT_KEY     — api.quiverquant.com ($30/mo Hobbyist) for FINRA dark pool short-vol data
#                          System works fully without this; OBV + volume signals cover the same signal

name: Weekly watchlist digest

on:
  schedule:
    - cron: "35 13 * * 1"  # Monday    6:35 AM PDT (13:35 UTC) → owned portfolio
    - cron: "35 13 * * 4"  # Thursday  6:35 AM PDT (13:35 UTC) → watchlist candidates
  workflow_dispatch:        # Allow manual runs from Actions tab
    inputs:
      group:
        description: "Which group to run"
        required: true
        type: choice
        options:
          - owned
          - watchlist

permissions:
  contents: write             # Needed to commit history CSVs + accuracy report back to repo
  pages: write                # Needed to deploy to GitHub Pages
  id-token: write             # Needed for Pages OIDC auth

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Run pipeline, generate report + email ───────────────────────────────────────────
  analyse:
    name: Analyse watchlist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so git push works cleanly

      - name: Restore signal cache
        uses: actions/cache@v4
        with:
          path: cache/signals_cache.json
          key: signals-cache-${{ github.run_id }}
          restore-keys: signals-cache-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine group
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "GROUP=${{ github.event.inputs.group }}" >> $GITHUB_ENV
          else
            DAY=$(date +%u)   # 1=Mon, 4=Thu
            if [ "$DAY" == "1" ]; then
              echo "GROUP=owned" >> $GITHUB_ENV
            else
              echo "GROUP=watchlist" >> $GITHUB_ENV
            fi
          fi
          echo "Running group: $GROUP"

      - name: Run watchlist pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
          ALPHA_VANTAGE_KEY:   ${{ secrets.ALPHA_VANTAGE_KEY }}
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
          CI_PAGES_URL:        https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python src/main.py --group $GROUP

      - name: Commit history data back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Include public/data/ so Streamlit Cloud picks up pipeline scores
          git add data/history/ data/accuracy_report.json data/edgar_cik_map.json public/data/ || true
          # Only commit if there are staged changes
          git diff --cached --quiet || git commit -m "chore: update score history, accuracy report + dashboard data [skip ci]"
          git push origin HEAD:${{ github.ref_name }} || true
        if: always()

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Save signal cache back to repo
        uses: actions/cache/save@v4
        if: always()
        with:
          path: cache/signals_cache.json
          key: signals-cache-${{ github.run_id }}

  # ── Job 2: Deploy public/ to GitHub Pages ──────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: analyse
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
